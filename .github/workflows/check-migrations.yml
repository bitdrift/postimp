name: Check migration numbers

on:
  pull_request:
    paths:
      - "supabase/migrations/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for duplicate migration numbers
        run: |
          dupes=$(ls supabase/migrations/*.sql | xargs -n1 basename | sed 's/_.*//' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate migration numbers found: $dupes"
            exit 1
          fi
          echo "No duplicate migration numbers"
